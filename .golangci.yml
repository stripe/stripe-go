version: "2"

linters:
  settings:
    staticcheck:
      checks:
        - "all"
        # ST1005/ST1020/ST1021 are comment-format rules. All current violations are in
        # generated resource files (e.g. account.go, bankaccount/client.go) that cannot
        # be edited. TODO: fix the code generator to emit compliant comments, then
        # remove these suppressions.
        - "-ST1005"
        - "-ST1020"
        - "-ST1021"

  exclusions:
    rules:
      # SA1019: deprecated client package usage. These files use the old client.API /
      # client.New surface intentionally (backward-compat tests or generated examples).
      # TODO: migrate each file to stripe.NewClient in a follow-up PR.
      - path: "^account/client_test\\.go$"
        linters: [staticcheck]
        text: "SA1019"
      - path: "^charge/client_test\\.go$"
        linters: [staticcheck]
        text: "SA1019"
      - path: "^coupon/client_test\\.go$"
        linters: [staticcheck]
        text: "SA1019"
      - path: "^example/generated_examples_test\\.go$"
        linters: [staticcheck]
        text: "SA1019"
      - path: "^mock/mock\\.go$"
        linters: [staticcheck]
        text: "SA1019"
      - path: "^oauth/client_test\\.go$"
        linters: [staticcheck]
        text: "SA1019"
      - path: "^v2/billing/meterevent/client_test\\.go$"
        linters: [staticcheck]
        text: "SA1019"
      - path: "^v2/billing/metereventadjustment/client_test\\.go$"
        linters: [staticcheck]
        text: "SA1019"
      - path: "^v2/billing/metereventsession/client_test\\.go$"
        linters: [staticcheck]
        text: "SA1019"
      - path: "^v2/billing/metereventstream/client_test\\.go$"
        linters: [staticcheck]
        text: "SA1019"
      - path: "^v2/core/eventdestination/client_test\\.go$"
        linters: [staticcheck]
        text: "SA1019"
      - path: "^webhook/client_test\\.go$"
        linters: [staticcheck]
        text: "SA1019"

